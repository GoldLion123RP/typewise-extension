name: Deploy Homepage

on:
  push:
    branches:
      - main
    paths:
      - homepage/**
      - .github/workflows/pages.yml
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          rm -rf site
          mkdir -p site/assets/icons
          cp -R homepage/. site/
          cp assets/icons/icon-128.png site/assets/icons/icon-128.png

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4